<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ícone: caixa 3D com símbolo de interruptor -->
  <!-- Caixa isométrica simplificada -->
  <rect x="12" y="16" width="28" height="36" rx="3" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <rect x="16" y="20" width="20" height="28" rx="2" fill="#f5f5f5" stroke="#555" stroke-width="1"/>
  <!-- Símbolo do interruptor dentro da caixa -->
  <circle cx="26" cy="34" r="6" fill="none" stroke="#1a73e8" stroke-width="1.5"/>
  <line x1="32" y1="34" x2="36" y2="34" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Seta indicando geração 3D -->
  <polygon points="48,28 56,34 48,40" fill="#1a73e8"/>
  <line x1="42" y1="34" x2="48" y2="34" stroke="#1a73e8" stroke-width="2"/>
</svg>
